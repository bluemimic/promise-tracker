{% extends 'core/base.html' %}
{% load i18n %}

{% block title %}{% translate "Edit Legislative Institution" %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">
        <h4>{% translate "Edit Legislative Institution" %}</h4>
      </div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data" novalidate>
          {% csrf_token %}
          {% include 'core/_form_fields.html' with form=form %}

          <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary">{% translate "Save" %}</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
