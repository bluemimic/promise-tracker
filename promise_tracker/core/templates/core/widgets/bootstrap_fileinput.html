<div class="mb-2">
    {% if widget.value %}
        <div class="mb-2">
            <img src="{{ widget.value.url }}" alt="{{ widget.value }}" class="img-thumbnail" style="max-height: 200px;">

            <div class="form-check">
                <input type="checkbox" name="{{ widget.checkbox_name }}" id="{{ widget.checkbox_id }}" class="form-check-input">
                <label class="form-check-label" for="{{ widget.checkbox_id }}">{{ widget.clear_checkbox_label }}</label>
            </div>
        </div>
    {% endif %}

    <input type="file"
           name="{{ widget.name }}"
           class="form-control"
           {% include "django/forms/widgets/attrs.html" %}>
</div>
